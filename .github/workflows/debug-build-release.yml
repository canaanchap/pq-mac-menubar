name: Debug Build + Release

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest
    env:
      APP_NAME: PQMenuBarApp
      BUNDLE_ID: com.canaan.pq-menubar.debug

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect project directory
        id: project
        run: |
          set -euo pipefail
          # Prefer root package; otherwise locate first nested Swift package.
          if [[ -f "${GITHUB_WORKSPACE}/Package.swift" ]]; then
            PROJECT_DIR="${GITHUB_WORKSPACE}"
          else
            PKG_FILE="$(find "${GITHUB_WORKSPACE}" -type f -name Package.swift -print -quit)"
            PROJECT_DIR="${PKG_FILE%/Package.swift}"
          fi
          if [[ -z "${PROJECT_DIR:-}" || ! -f "${PROJECT_DIR}/Package.swift" ]]; then
            echo "Could not find Package.swift in repository checkout." >&2
            exit 1
          fi
          echo "project_dir=${PROJECT_DIR}" >> "$GITHUB_OUTPUT"
          echo "Using project dir: ${PROJECT_DIR}"

      - name: Resolve version
        id: ver
        working-directory: ${{ steps.project.outputs.project_dir }}
        run: |
          set -euo pipefail
          VERSION="$(tr -d ' \n\r' < VERSION)"
          if [[ -z "$VERSION" ]]; then
            echo "VERSION file is empty" >&2
            exit 1
          fi
          TAG="debug-v${VERSION}-build.${GITHUB_RUN_NUMBER}"
          NAME="Debug v${VERSION} (build ${GITHUB_RUN_NUMBER})"
          ZIP="PQMenuBarApp-debug-v${VERSION}-build.${GITHUB_RUN_NUMBER}.zip"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"

      - name: Ensure scripts are executable
        working-directory: ${{ steps.project.outputs.project_dir }}
        run: chmod +x ./scripts/dev-build.sh ./scripts/dev-setup.sh || true

      - name: Build (debug)
        working-directory: ${{ steps.project.outputs.project_dir }}
        run: ./scripts/dev-build.sh

      - name: Locate debug binary
        id: binpath
        working-directory: ${{ steps.project.outputs.project_dir }}
        run: |
          BIN_PATH="$(swift build -c debug --show-bin-path)"
          echo "bin_path=$BIN_PATH" >> "$GITHUB_OUTPUT"
          ls -la "$BIN_PATH"

      - name: Package debug .app bundle
        working-directory: ${{ steps.project.outputs.project_dir }}
        run: |
          set -euo pipefail
          BIN_PATH="${{ steps.binpath.outputs.bin_path }}"
          APP_DIR="dist/${APP_NAME}-debug.app"
          rm -rf "$APP_DIR"
          mkdir -p "$APP_DIR/Contents/MacOS" "$APP_DIR/Contents/Resources"

          cp "$BIN_PATH/$APP_NAME" "$APP_DIR/Contents/MacOS/$APP_NAME"
          chmod +x "$APP_DIR/Contents/MacOS/$APP_NAME"

          # Copy SwiftPM resource bundles (required for Bundle.module lookups).
          # We search .build to avoid layout mismatches across toolchain versions.
          BUNDLES="$(find .build -type d -name "*.bundle" | sort)"
          if [[ -z "$BUNDLES" ]]; then
            echo "No .bundle resources found in .build; failing packaging." >&2
            exit 1
          fi
          while IFS= read -r bundle; do
            cp -R "$bundle" "$APP_DIR/Contents/Resources/"
          done <<< "$BUNDLES"

          cat > "$APP_DIR/Contents/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>PQMenuBarApp</string>
            <key>CFBundleDisplayName</key><string>PQMenuBarApp (Debug)</string>
            <key>CFBundleIdentifier</key><string>com.canaan.pq-menubar.debug</string>
            <key>CFBundleVersion</key><string>1</string>
            <key>CFBundleShortVersionString</key><string>1.0-debug</string>
            <key>CFBundleExecutable</key><string>PQMenuBarApp</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>LSMinimumSystemVersion</key><string>15.0</string>
            <key>LSUIElement</key><true/>
          </dict>
          </plist>
          PLIST

          codesign --force --deep --sign - "$APP_DIR"

      - name: Verify bundled resources
        working-directory: ${{ steps.project.outputs.project_dir }}
        run: |
          set -euo pipefail
          APP_DIR="dist/${APP_NAME}-debug.app"
          ls -la "$APP_DIR/Contents/Resources"
          test -d "$APP_DIR/Contents/Resources/pq-menubar_PQMenuBarApp.bundle"

      - name: Zip artifact
        working-directory: ${{ steps.project.outputs.project_dir }}
        run: |
          set -euo pipefail
          mkdir -p out
          ditto -c -k --keepParent "dist/${APP_NAME}-debug.app" "out/${{ steps.ver.outputs.zip }}"
          ls -lah out

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.ver.outputs.tag }}
          path: ${{ steps.project.outputs.project_dir }}/out/${{ steps.ver.outputs.zip }}
          if-no-files-found: error

      - name: Create debug release for commit
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.name }}
          prerelease: true
          make_latest: false
          generate_release_notes: false
          files: ${{ steps.project.outputs.project_dir }}/out/${{ steps.ver.outputs.zip }}
